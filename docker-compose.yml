services:
  frontend:
    build: ./frontend
    container_name: frontend
    restart: always
    ports:
      - "${FRONTED_PORT}:${FRONTED_PORT}" 
    depends_on:
      - backend
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html
      - ./frontend/assets:/usr/share/nginx/html/assets
      - ./frontend/css:/usr/share/nginx/html/css
      - ./frontend/js:/usr/share/nginx/html/js

  backend:
    build: ./backend
    command: uvicorn src.main:app --host ${BACKEND_HOST} --port ${BACKEND_PORT} --reload
    volumes:
      - ./backend/src:/src 
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    env_file:
      - .env
    depends_on:
      cache:
        condition: service_started
      backend_db:
        condition: service_healthy

  backend_db:
    image: postgres:14-alpine
    container_name: backend_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}  
    ports:
      - "${DB_PORT}:${DB_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s      
      timeout: 5s     
      retries: 5  
      start_period: 10s 
  
  cache:
    image: redis:7-alpine
    restart: always

volumes:
  postgres_data: