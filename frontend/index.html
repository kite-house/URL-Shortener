<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL-Shortener | Сервис сокращения ссылок</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
    <script>
        // Функция для определения и применения темы
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            
            if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
                document.documentElement.classList.add('dark-theme');
                document.body.classList.add('dark-theme');
            }
        })();
    </script>
</head>
<body>
    <div class="gradient-bg">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
    </div>

    <div class="wrapper">
        <header class="header">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-link"></i>
                </div>
                <span class="logo-text"></span>
            </div>
            <div class="theme-toggle" id="themeToggle">
                <i class="fas fa-moon"></i>
            </div>
        </header>

        <main class="main-centered">
            <div class="content-wrapper">
                <div class="card form-card glass-effect">
                    <div class="form-header">
                        <h1 class="title">
                            Сократите <span class="title-gradient">длинную ссылку</span>
                        </h1>
                        <button type="button" id="toggleAdvancedBtn" class="settings-btn" title="Дополнительные настройки">
                            <i class="fas fa-sliders-h"></i>
                        </button>
                    </div>
                    
                    <p class="subtitle">Вставьте ссылку и получите короткую в одно мгновение</p>
                    
                    <form id="shortenForm">
                        <div class="input-wrapper">
                            <div class="input-group">
                                <i class="fas fa-link input-icon"></i>
                                <input 
                                    type="url" 
                                    id="urlInput" 
                                    placeholder="Загрузка..." 
                                    required
                                    autocomplete="off"
                                    spellcheck="false"
                                >
                                <button type="submit" id="shortenBtn" class="btn-primary">
                                    <span class="btn-text">Сократить</span>
                                    <span class="btn-loader" style="display: none;">
                                        <i class="fas fa-circle-notch fa-spin"></i>
                                    </span>
                                </button>
                            </div>
                        </div>

                        <div class="advanced-settings" id="advancedSettings" style="display: none;">
                            <div class="settings-panel">
                                <div class="settings-header">
                                    <i class="fas fa-cog"></i>
                                    <span>Дополнительные параметры</span>
                                </div>
                                <div class="settings-content">
                                    <div class="setting-item">
                                        <label for="customSlug" class="setting-label">
                                            <i class="fas fa-pencil-alt"></i>
                                            <span>Свой вариант ссылки</span>
                                        </label>
                                        <div class="setting-input-wrapper">
                                            <span class="input-prefix">/</span>
                                            <input 
                                                type="text" 
                                                id="customSlug" 
                                                placeholder="my-custom-link"
                                                class="setting-input"
                                                autocomplete="off"
                                                spellcheck="false"
                                            >
                                        </div>
                                        <small class="setting-hint">Только латинские буквы, цифры, дефис и подчеркивание</small>
                                    </div>

                                    <div class="setting-item">
                                        <label for="slugLength" class="setting-label">
                                            <i class="fas fa-ruler"></i>
                                            <span>Длина ссылки: <span id="lengthValue">6</span> символов</span>
                                        </label>
                                        <div class="slider-container">
                                            <input 
                                                type="range" 
                                                id="slugLength" 
                                                min="3" 
                                                max="10" 
                                                value="6"
                                                class="slider"
                                            >
                                            <div class="slider-markers">
                                                <span>3</span>
                                                <span>6</span>
                                                <span>10</span>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="setting-item">
                                        <label for="ttlDays" class="setting-label">
                                            <i class="fas fa-hourglass-half"></i>
                                            <span>Срок действия ссылки</span>
                                        </label>
                                        <div class="setting-input-wrapper">
                                            <select id="ttlDays" class="setting-input" style="padding: 0.75rem 1rem;">
                                                <option value="">Бессрочно</option>
                                                <option value="1">1 день</option>
                                                <option value="3">3 дня</option>
                                                <option value="7">7 дней</option>
                                                <option value="30">30 дней</option>
                                                <option value="90">90 дней</option>
                                                <option value="365">1 год</option>
                                            </select>
                                        </div>
                                        <small class="setting-hint">Ссылка автоматически истечёт через выбранный период</small>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </form>

                    <div class="result-card" id="resultCard" style="display: none;">
                        <div class="result-header">
                            <div class="result-icon">
                                <i class="fas fa-check-circle"></i>
                            </div>
                            <span>Готово! Ваша короткая ссылка:</span>
                            <button class="close-result-btn" id="closeResultBtn" title="Закрыть">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                        <div class="result-content">
                            <div class="url-display">
                                <input type="text" id="shortUrl" readonly value="">
                                <button class="copy-btn" id="copyBtn" onclick="copyToClipboard()">
                                    <i class="fas fa-copy"></i>
                                    <span>Копировать</span>
                                </button>
                            </div>
                            <div class="original-url" id="originalUrl">
                                <i class="fas fa-link"></i>
                                <span></span>
                            </div>
                            <div class="expiry-info" id="expiryInfo" style="margin-top: 0.75rem; font-size: 0.8rem; color: var(--text-muted);">
                                <i class="fas fa-clock"></i>
                                <span id="expiryText"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <p></p>
            <div class="footer-links">
                <a href="https://github.com/kite-house/URL-Shortener" class="footer-link"><i class="fab fa-github"></i></a>
            </div>
        </footer>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script>
        // Тоггл темы
        const themeToggle = document.getElementById('themeToggle');
        if (themeToggle) {
            themeToggle.addEventListener('click', () => {
                document.body.classList.toggle('dark-theme');
                const icon = themeToggle.querySelector('i');
                if (document.body.classList.contains('dark-theme')) {
                    icon.className = 'fas fa-sun';
                    localStorage.setItem('theme', 'dark');
                } else {
                    icon.className = 'fas fa-moon';
                    localStorage.setItem('theme', 'light');
                }
            });
            
            const icon = themeToggle.querySelector('i');
            if (document.body.classList.contains('dark-theme')) {
                icon.className = 'fas fa-sun';
            } else {
                icon.className = 'fas fa-moon';
            }
        }
    </script>
</body>
</html>
