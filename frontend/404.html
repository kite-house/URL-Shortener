<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Ссылка не найдена</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            
            if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
                document.documentElement.classList.add('dark-theme');
                document.body.classList.add('dark-theme');
            }
        })();
    </script>
</head>
<body>
    <div class="gradient-bg">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
    </div>

    <div class="wrapper">
        <header class="header">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-link"></i>
                </div>
                <span class="logo-text">URL-Shortener</span>
            </div>
            <div class="theme-toggle" id="themeToggle">
                <i class="fas fa-moon"></i>
            </div>
        </header>

        <main class="main-centered">
            <div class="content-wrapper">
                <div class="card glass-effect" style="text-align: center;">
                    <div style="font-size: 120px; color: var(--accent-color);">
                        <i class="fas fa-search"></i>
                    </div>
                    <h1 style="font-size: 80px; margin: 20px 0; color: var(--text-primary);">404</h1>
                    <h2 style="margin-bottom: 20px; color: var(--text-secondary);">Ссылка не найдена</h2>
                    <p style="margin-bottom: 30px; color: var(--text-muted);">
                        К сожалению, такой короткой ссылки не существует или она была удалена.
                    </p>
                    <a href="/" class="btn-primary" style="display: inline-block; text-decoration: none; border-radius: 16px;">
                        <i class="fas fa-arrow-left"></i> Создать новую ссылку
                    </a>
                </div>
            </div>
        </main>

        <footer class="footer">
            <p>© 2026 URL-Shortener</p>
        </footer>
    </div>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        if (themeToggle) {
            themeToggle.addEventListener('click', () => {
                document.body.classList.toggle('dark-theme');
                const icon = themeToggle.querySelector('i');
                if (document.body.classList.contains('dark-theme')) {
                    icon.className = 'fas fa-sun';
                    localStorage.setItem('theme', 'dark');
                } else {
                    icon.className = 'fas fa-moon';
                    localStorage.setItem('theme', 'light');
                }
            });
            
            const icon = themeToggle.querySelector('i');
            if (document.body.classList.contains('dark-theme')) {
                icon.className = 'fas fa-sun';
            } else {
                icon.className = 'fas fa-moon';
            }
        }
    </script>
</body>
</html>
